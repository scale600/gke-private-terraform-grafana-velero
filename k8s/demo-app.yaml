        .phase-item { padding: 5px 0; display: flex; align-items: center; gap: 8px; font-size: 14px; color: #94a3b8; }
        .check { color: #4ade80; font-weight: bold; }
        .arch-box { background: #0d1117; border: 1px solid #374151; border-radius: 8px; font-family: monospace; font-size: 13px; line-height: 1.8; color: #7dd3fc; padding: 20px; overflow-x: auto; white-space: pre; }
        .metric-value { font-size: 2.5rem; font-weight: 800; }
        iframe { border-radius: 8px; border: 1px solid #2d3748; }
        .nav-link { color: #94a3b8; transition: color 0.2s; }
        .nav-link:hover { color: #e2e8f0; }
      </style>
    </head>
    <body>
    <nav class="border-b border-gray-800 px-8 py-4 flex items-center justify-between sticky top-0 z-50" style="background:#0f1117cc;backdrop-filter:blur(12px)">
