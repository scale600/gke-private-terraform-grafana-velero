    <div class="max-w-6xl mx-auto px-6 py-16">
      <div class="text-center mb-20">
        <div class="flex justify-center gap-2 mb-6 flex-wrap">
          <span class="badge" style="background:#1a3a2a;color:#4ade80">Terraform IaC</span>
          <span class="badge" style="background:#1a2a3a;color:#60a5fa">GCP GKE Cluster</span>
          <span class="badge" style="background:#2a1a3a;color:#a78bfa">CI/CD + WIF</span>
          <span class="badge" style="background:#3a2a1a;color:#fb923c">Grafana Observability</span>
          <span class="badge" style="background:#1a2a2a;color:#2dd4bf">Velero DR</span>
        </div>
        <h1 class="text-5xl font-black mb-4 leading-tight">
          <span class="gradient-text">Private GKE Cluster</span><br>
          <span class="text-white">on Google Cloud</span>
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto leading-relaxed">
          End-to-end cloud engineering project: private GKE cluster provisioned with Terraform,
          automated CI/CD via GitHub Actions + Workload Identity Federation,
          real-time Grafana observability, and Velero disaster recovery — all under minimal cost.
        </p>
        <div class="flex justify-center gap-4 mt-8">
          <a href="/grafana/d/gke-overview/gke-private-demo?orgId=1&kiosk"
             class="px-6 py-3 rounded-lg font-semibold text-sm text-white"
             style="background:linear-gradient(135deg,#4ade80,#60a5fa)">
            View Live Dashboard
          </a>
          <a href="https://github.com/scale600/gke-private-terraform-grafana-velero" target="_blank"
             class="px-6 py-3 rounded-lg font-semibold text-sm border border-gray-600 hover:border-gray-400 transition-colors">
            GitHub Repo
          </a>
        </div>
      </div>
      <div class="mb-16">
        <h2 class="text-2xl font-bold text-center text-white mb-8">Project Phases</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="card p-6 phase-done">
            <div class="flex items-center justify-between mb-4">
              <span class="badge" style="background:#1a3a2a;color:#4ade80">Phase 1 Complete</span>
            </div>
            <h3 class="font-bold text-white mb-3">Core Infrastructure</h3>
            <div>
              <div class="phase-item"><span class="check">+</span> VPC + Cloud NAT + Firewall</div>
              <div class="phase-item"><span class="check">+</span> GCP GKE Cluster (Spot e2-small)</div>
              <div class="phase-item"><span class="check">+</span> Terraform IaC (25 resources)</div>
              <div class="phase-item"><span class="check">+</span> Cloud Armor threat policy</div>
              <div class="phase-item"><span class="check">+</span> GitHub Actions + WIF (no SA keys)</div>
            </div>
          </div>
          <div class="card p-6 phase-done">
            <div class="flex items-center justify-between mb-4">
              <span class="badge" style="background:#1a2a3a;color:#60a5fa">Phase 2 Complete</span>
            </div>
            <h3 class="font-bold text-white mb-3">Observability</h3>
            <div>
              <div class="phase-item"><span class="check">+</span> Cloud Monitoring metrics</div>
              <div class="phase-item"><span class="check">+</span> Grafana 11 on GKE (WIF auth)</div>
              <div class="phase-item"><span class="check">+</span> GKE Ingress + Google Managed SSL</div>
              <div class="phase-item"><span class="check">+</span> Custom GKE dashboard (CPU/Memory/Pods)</div>
              <div class="phase-item"><span class="check">+</span> gcp-gke.techcloudup.com</div>
            </div>
          </div>
          <div class="card p-6 phase-done">
            <div class="flex items-center justify-between mb-4">
              <span class="badge" style="background:#2a1a3a;color:#a78bfa">Phase 3 Complete</span>
            </div>
            <h3 class="font-bold text-white mb-3">DR &amp; Backup</h3>
            <div>
              <div class="phase-item"><span class="check">+</span> Velero v1.18 + GCP plugin</div>
              <div class="phase-item"><span class="check">+</span> Daily backup to GCS bucket</div>
              <div class="phase-item"><span class="check">+</span> DR Sim 1: pod auto-recovery RTO &lt;10s</div>
              <div class="phase-item"><span class="check">+</span> DR Sim 2: Velero restore RTO 4s</div>
              <div class="phase-item"><span class="check">+</span> RPO &lt; 24h (daily schedule)</div>
            </div>
          </div>
        </div>
      </div>
      <div class="mb-16">
        <h2 class="text-2xl font-bold text-center text-white mb-2">Live GKE Metrics</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Real-time data from Cloud Monitoring via Grafana</p>
        <div class="card p-4">
          <iframe
            src="/grafana/d/gke-overview/gke-private-demo?orgId=1&refresh=30s&kiosk&theme=dark"
            width="100%"
            height="480"
            frameborder="0">
          </iframe>
        </div>
      </div>
      <div class="mb-16">
        <h2 class="text-2xl font-bold text-center text-white mb-8">Key Metrics</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="card p-6 text-center">
            <div class="metric-value" style="color:#4ade80">25</div>
            <div class="text-gray-400 text-sm mt-1">GCP Resources via Terraform</div>
          </div>
          <div class="card p-6 text-center">
            <div class="metric-value" style="color:#60a5fa">&lt;10s</div>
            <div class="text-gray-400 text-sm mt-1">RTO Auto-Recovery</div>
          </div>
          <div class="card p-6 text-center">
            <div class="metric-value" style="color:#a78bfa">4s</div>
            <div class="text-gray-400 text-sm mt-1">RTO Velero Restore</div>
          </div>
          <div class="card p-6 text-center">
            <div class="metric-value" style="color:#fb923c">~$12</div>
            <div class="text-gray-400 text-sm mt-1">Monthly Cost (Spot)</div>
          </div>
        </div>
      </div>
      <div class="mb-16">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Architecture</h2>
        <div class="arch-box" id="arch-diagram"></div>
        <script>
          var lines = [
            '[Cloudflare DNS]  gcp-gke.techcloudup.com  A record (Proxy OFF)',
            '        |',
            '        v',
            '[GCP Static IP: 8.232.180.134]',
            '        |',
            '        v',
            '[GKE Ingress + Cloud Armor + Google Managed SSL]',
            '        |',
            '        +-- /         -->  [Demo App (nginx)]   <- you are here',
            '        +-- /grafana  -->  [Grafana 11 ClusterIP]',
            '                                  |',
            '                           [Cloud Monitoring]',
            '                            GKE WIF --> GSA',
            '',
            '[GitHub Actions] -- push to main',
            '        |  WIF (no long-lived SA keys)',
            '        v',
            '[GCP GKE Cluster  us-central1-f]',
            '        |',
            '        +-- VPC (10.0.0.0/24)',
            '              +-- Private Nodes (Spot e2-small, autoscale 1->2)',
            '              +-- Cloud NAT (egress)',
            '              +-- GCS Bucket  <-- Velero daily backup'
          ];
          document.getElementById('arch-diagram').textContent = lines.join('\n');
        </script>
      </div>
      <div class="mb-16">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Tech Stack</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <div class="card p-5">
            <div class="text-blue-400 text-xs font-bold mb-2 uppercase tracking-wider">Infrastructure</div>
            <div class="space-y-2 text-sm text-gray-300">
              <div>Terraform ~&gt;5.0 (IaC)</div>
              <div>GCP GKE Cluster (Zonal)</div>
              <div>VPC-native networking</div>
              <div>Cloud NAT, Cloud Armor</div>
            </div>
          </div>
          <div class="card p-5">
            <div class="text-green-400 text-xs font-bold mb-2 uppercase tracking-wider">CI/CD &amp; Security</div>
            <div class="space-y-2 text-sm text-gray-300">
              <div>GitHub Actions</div>
              <div>Workload Identity Federation</div>
              <div>Kubernetes Network Policy</div>
              <div>Google Managed SSL</div>
            </div>
          </div>
          <div class="card p-5">
            <div class="text-purple-400 text-xs font-bold mb-2 uppercase tracking-wider">Observability &amp; DR</div>
            <div class="space-y-2 text-sm text-gray-300">
              <div>Cloud Monitoring</div>
              <div>Grafana 11.0</div>
              <div>Velero v1.18 + GCS</div>
              <div>Cloudflare DNS</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card p-8 text-center">
        <h2 class="font-bold text-xl text-white mb-2">Source Code</h2>
        <p class="text-gray-400 text-sm mb-6">Terraform, Kubernetes manifests, GitHub Actions workflow</p>
        <a href="https://github.com/scale600/gke-private-terraform-grafana-velero" target="_blank"
           class="inline-flex items-center gap-2 px-6 py-3 rounded-lg border border-gray-600 hover:border-gray-300 transition-colors text-sm font-semibold">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          scale600/gke-private-terraform-grafana-velero
        </a>
      </div>
    </div>
    <footer class="border-t border-gray-800 mt-16 px-8 py-6 text-center text-gray-600 text-sm">
      GCP GKE Cluster Project &middot; us-central1-f &middot; Spot e2-small &middot; All 3 phases complete
    </footer>
    </body>
    </html>
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: html
        configMap:
          name: demo-html
          items:
          - key: index.html
            path: index.html
      - name: nginx-conf
        configMap:
          name: demo-html
          items:
          - key: nginx.conf
            path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
  annotations:
    cloud.google.com/backend-config: '{"default": "demo-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: demo-backendconfig
  namespace: default
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /
    port: 80
