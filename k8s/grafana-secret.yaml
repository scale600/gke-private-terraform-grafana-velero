# ⚠️ SECURITY: This file contains a PLACEHOLDER only.
# The real Grafana admin password MUST NOT be committed to git.
# Apply the actual secret via kubectl before deploying:
#
#   kubectl create secret generic grafana-secret \
#     --from-literal=admin-password='YOUR_STRONG_PASSWORD' \
#     --namespace=default \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or use a sealed-secrets / external-secrets operator for GitOps.
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: default
type: Opaque
stringData:
  # CHANGE THIS before applying. This is a placeholder — do NOT use in production.
  admin-password: "CHANGE_ME_BEFORE_DEPLOY"
