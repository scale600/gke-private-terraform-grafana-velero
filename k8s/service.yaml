apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: hello-gke-backendconfig
  namespace: default
spec:
  securityPolicy:
    name: gke-private-demo-threat-policy
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /
    port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-gke-svc
  namespace: default
  annotations:
    cloud.google.com/backend-config: '{"default": "hello-gke-backendconfig"}'
spec:
  type: LoadBalancer
  selector:
    app: hello-gke
  ports:
  - port: 80
    targetPort: 8080
